services:
  agent-sandbox:
    build:
      context: .
      args:
        # ===== 安装开关（默认全部安装）=====
        INSTALL_CLAUDE_CODE: ${INSTALL_CLAUDE_CODE:-true}
        INSTALL_CODEX: ${INSTALL_CODEX:-true}
        # ===== 版本（默认最新版）=====
        CLAUDE_CODE_VERSION: ${CLAUDE_CODE_VERSION:-latest}
        CODEX_VERSION: ${CODEX_VERSION:-latest}
    container_name: agent-sandbox
    hostname: agent-sandbox
    # 交互式终端支持
    stdin_open: true
    tty: true
    environment:
      - TZ=Asia/Shanghai
      # ===== Claude Code 认证（在 .env 中填写，留空则不生效）=====
      # 方式一：Anthropic 官方 API Key
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # 方式二：第三方中转 API（自定义 Base URL + Token）
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN:-}
      # 可选：指定模型（部分第三方服务需要自定义模型名）
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-}
      - ANTHROPIC_SMALL_FAST_MODEL=${ANTHROPIC_SMALL_FAST_MODEL:-}
      # ===== Codex 认证 =====
      # 注意：Codex 不认 OPENAI_BASE_URL 环境变量。第三方中转需同时设置
      # OPENAI_API_KEY + CODEX_BASE_URL，入口脚本会在启动时自动生成
      # ~/.codex/config.toml 和 ~/.codex/auth.json
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CODEX_BASE_URL=${CODEX_BASE_URL:-}
      # 可选：模型名 / wire API（responses 或 chat）/ 推理强度
      - CODEX_MODEL=${CODEX_MODEL:-}
      - CODEX_WIRE_API=${CODEX_WIRE_API:-}
      - CODEX_MODEL_REASONING_EFFORT=${CODEX_MODEL_REASONING_EFFORT:-}
    volumes:
      # 挂载你的工作目录（按需修改左侧路径）
      - ./workspace:/workspace
      # 持久化整个 home 目录（~/.claude/、~/.claude.json、~/.codex/ 等
      # 登录凭证和配置），重建容器后无需重新登录
      - agent-home:/home/agent
      # 可选：复用宿主机 git 配置
      # - ~/.gitconfig:/home/agent/.gitconfig:ro
      # 可选：复用宿主机 SSH key（用于 git clone）
      # - ~/.ssh:/home/agent/.ssh:ro
    restart: unless-stopped

volumes:
  agent-home:
